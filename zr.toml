[project]
name = "zr"
description = "Release automation for Zig projects"
license = "MIT"

[build]
zig_version = "0.14.0"

[[targets]]
os = "linux"
arch = "x86_64"

[[targets]]
os = "macos"
arch = "aarch64"

[[targets]]
os = "macos"
arch = "x86_64"

[[targets]]
os = "windows"
arch = "x86_64"

[packages.tarball]
format = "tar.gz"

[release.github]
owner = "vmvarela"
repo = "zr"
